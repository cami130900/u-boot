name: "CodeQL Custom Taint Analysis"

on:
  push:
    branches: [ "master", "main" ]

jobs:
  analyze:
    name: Analyze U-Boot
    runs-on: ubuntu-22.04
    permissions:
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        # Abbiamo aggiunto libsdl2-dev alla lista
        sudo apt-get install -y bc bison build-essential flex libssl-dev make libsdl2-dev

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: c-cpp
        queries: ./.github/custom-queries/11_taint_with_barrier.ql

    - name: Build U-Boot (Sandbox)
      run: |
        make sandbox_defconfig
        # Abbiamo aggiunto -fcommon per risolvere il problema 'multiple definition'
        make KCFLAGS="-w -fcommon" -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
