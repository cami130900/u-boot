name: "CodeQL Custom Taint Analysis"

on:
  push:
    branches: [ "master", "main" ]

jobs:
  analyze:
    name: Analyze U-Boot
    # Usiamo la 22.04: è molto più facile da trovare per GitHub rispetto alla 20.04
    runs-on: ubuntu-22.04
    permissions:
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential flex libssl-dev make

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: c-cpp
        queries: ./.github/custom-queries/11_taint_with_barrier.ql

    - name: Build U-Boot (Sandbox)
      # Aggiungiamo 'KCFLAGS=-w' per ignorare tutti i warning del compilatore moderno 
      # che bloccherebbero il codice vecchio del 2019
      run: |
        make sandbox_defconfig
        make KCFLAGS="-w" -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
